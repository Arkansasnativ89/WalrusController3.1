<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Cyborg Walrus Favicon</title>
  <desc id="desc">A clean, favicon-ready SVG of a cyborg walrus with glowing eyes on a dark rounded-square background.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08101d"/>
      <stop offset="100%" stop-color="#0e1d36"/>
    </linearGradient>

    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e3d55"/>
      <stop offset="100%" stop-color="#182433"/>
    </linearGradient>

    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5e708a"/>
      <stop offset="50%" stop-color="#93a5bc"/>
      <stop offset="100%" stop-color="#31445a"/>
    </linearGradient>

    <linearGradient id="tusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4fbff"/>
      <stop offset="100%" stop-color="#a8bccf"/>
    </linearGradient>

    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8ffff"/>
      <stop offset="35%" stop-color="#5ad1ff"/>
      <stop offset="70%" stop-color="#108cff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#108cff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="iconClip">
      <rect x="10" y="10" width="236" height="236" rx="42"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect x="10" y="10" width="236" height="236" rx="42" fill="url(#bg)"/>

    <ellipse cx="128" cy="138" rx="74" ry="82" fill="url(#skin)"/>
    <path d="M72 138c8-46 42-78 56-78s48 32 56 78c-10-14-28-25-56-25s-46 11-56 25Z" fill="#223146" opacity="0.7"/>

    <path d="M88 80c12-18 32-29 40-29s28 11 40 29l-11 30H99L88 80Z" fill="url(#metal)"/>
    <path d="M107 62h42l8 17-16 12h-26L99 79l8-17Z" fill="#1a2a3f" opacity="0.75"/>
    <path d="M108 63h40" stroke="#c0d4eb" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>

    <ellipse cx="98" cy="112" rx="22" ry="20" fill="#182433"/>
    <ellipse cx="158" cy="112" rx="22" ry="20" fill="#182433"/>

    <circle cx="98" cy="112" r="20" fill="url(#eyeGlow)" filter="url(#softGlow)"/>
    <circle cx="158" cy="112" r="20" fill="url(#eyeGlow)" filter="url(#softGlow)"/>
    <circle cx="98" cy="112" r="8" fill="#dfffff"/>
    <circle cx="158" cy="112" r="8" fill="#dfffff"/>

    <path d="M111 129c4-9 12-14 17-14s13 5 17 14c-3 5-9 8-17 8s-14-3-17-8Z" fill="#0d1621"/>
    <ellipse cx="118" cy="129" rx="5.5" ry="4.5" fill="#223146"/>
    <ellipse cx="138" cy="129" rx="5.5" ry="4.5" fill="#223146"/>

    <path d="M84 148c10-13 29-20 44-20s34 7 44 20c-9 11-24 16-44 16s-35-5-44-16Z" fill="#2a394d"/>
    <path d="M82 151c14 7 31 10 46 10s32-3 46-10" stroke="#70839c" stroke-opacity="0.35" stroke-width="4" stroke-linecap="round"/>

    <path d="M112 150c-2 18-4 38-3 58" stroke="#9bb0c7" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
    <path d="M144 150c2 18 4 38 3 58" stroke="#9bb0c7" stroke-width="7" stroke-linecap="round" opacity="0.55"/>

    <path d="M106 145c-7 16-12 35-13 61 0 8 4 13 11 13 6 0 11-5 11-12 0-22 2-41 7-58-3-4-9-6-16-4Z" fill="url(#tusk)"/>
    <path d="M150 145c7 16 12 35 13 61 0 8-4 13-11 13-6 0-11-5-11-12 0-22-2-41-7-58 3-4 9-6 16-4Z" fill="url(#tusk)"/>
    <path d="M106 145c-7 16-12 35-13 61" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M150 145c7 16 12 35 13 61" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2.4" stroke-linecap="round" fill="none"/>

    <path d="M66 155c8 6 14 9 22 11" stroke="#18a0ff" stroke-opacity="0.45" stroke-width="4" stroke-linecap="round"/>
    <path d="M190 155c-8 6-14 9-22 11" stroke="#18a0ff" stroke-opacity="0.45" stroke-width="4" stroke-linecap="round"/>

    <circle cx="72" cy="90" r="2.5" fill="#4ec4ff" opacity="0.8"/>
    <circle cx="182" cy="74" r="2" fill="#4ec4ff" opacity="0.65"/>
    <circle cx="194" cy="134" r="2.5" fill="#4ec4ff" opacity="0.8"/>
  </g>
</svg>
